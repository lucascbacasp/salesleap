name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: salesleap
          POSTGRES_PASSWORD: salesleap
          POSTGRES_DB: salesleap_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U salesleap"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://salesleap:salesleap@localhost:5432/salesleap_test
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: ci-test-secret-key
      ANTHROPIC_API_KEY: test-key

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize test database
        run: |
          PGPASSWORD=salesleap psql -h localhost -U salesleap -d salesleap_test -f schema.sql

      - name: Run tests
        run: pytest -v --tb=short

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npx vite build
